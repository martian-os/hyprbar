name: CI

on:
  pull_request:
    branches:
      - master
      - main
  push:
    branches:
      - master
      - main

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libwayland-dev libcairo2-dev libpango1.0-dev libdbus-1-dev libgdk-pixbuf2.0-dev librsvg2-dev make file

      - name: Build project
        run: make

      - name: Run unit tests
        run: make test

      - name: Run integration tests
        run: make integration

      - name: Build release version
        run: make release

  lint:
    name: Lint C++ Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get install -y clang-format

      - name: Check code formatting
        run: |
          find src tests -name '*.cpp' -o -name '*.h' | xargs clang-format --dry-run --Werror
